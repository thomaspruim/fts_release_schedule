<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Release Schedule</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1>Release Schedule</h1>
        <p class="subtitle">Unified view across all service tabs</p>
        <div id="load-status" class="load-status" hidden>
          <div class="load-status-track" aria-hidden="true">
            <div id="load-progress" class="load-status-fill"></div>
          </div>
          <p id="load-message" class="load-message"></p>
          <ul id="load-tabs" class="load-tabs" aria-label="Service load status"></ul>
        </div>
      </div>
    </header>

    <div id="error-banner" class="error-banner" hidden></div>

    <main class="main">
      <section class="panel" id="calendar-section" aria-labelledby="calendar-heading">
        <div class="panel-header">
          <h2 id="calendar-heading">Release calendar</h2>
          <div id="service-legend" class="service-legend" aria-label="Service colors"></div>
        </div>

        <div class="calendar-toolbar">
          <button type="button" id="cal-prev" class="btn btn-ghost" aria-label="Previous month">←</button>
          <h3 id="calendar-month-label" class="calendar-month-label"></h3>
          <button type="button" id="cal-next" class="btn btn-ghost" aria-label="Next month">→</button>
          <button type="button" id="cal-today" class="btn btn-secondary">Today</button>
        </div>

        <div class="calendar-weekdays" aria-hidden="true">
          <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>

      <section class="panel" id="releases-section" aria-labelledby="releases-heading">
        <div class="panel-header">
          <h2 id="releases-heading">All releases</h2>
          <span id="releases-count" class="releases-count"></span>
        </div>

        <div class="filters">
          <label>
            Service
            <select id="filter-service"></select>
          </label>
          <label>
            Status
            <select id="filter-status"></select>
          </label>
          <label>
            Version contains
            <input type="search" id="filter-version" placeholder="e.g. 2.4" autocomplete="off" />
          </label>
          <label>
            From date
            <input type="date" id="filter-date-from" />
          </label>
          <label>
            To date
            <input type="date" id="filter-date-to" />
          </label>
          <button type="button" id="clear-filters" class="btn btn-secondary">Clear filters</button>
        </div>

        <div class="table-wrap">
          <table class="releases-table">
            <thead>
              <tr>
                <th data-sort="date" scope="col">Date</th>
                <th data-sort="service" scope="col">Service</th>
                <th data-sort="version" scope="col">Version</th>
                <th scope="col">Summary</th>
                <th data-sort="status" scope="col">Status</th>
              </tr>
            </thead>
            <tbody id="releases-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <button type="button" id="retry-load" class="btn btn-ghost btn-sm">Reload data</button>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
